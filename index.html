<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 16진수 표기법 */
        h1{
            color: #0000ff; 
            /* color: #00f; 3개로 생략 가능 */
            text-align: center;
            /* text-shadow: 가로거리 세로거리 번짐정도 색상 */
            text-shadow: 1px 3px 3px #333;
            /* 글자 간격 */
            letter-spacing: -3px;
        }
        h2{
            color: skyblue;
            text-shadow: 5px -5px 5px pink;
        }
        /* 색상 이름 표기법 */
        p{
            /* 줄 간격 조절하는 방법 */
            /* line-height: 50px; */
            /* line-height: 2.0; */
            line-height: 200%;
            color: green;
            text-align: right;
        }
        /* RGB 표기법 */
        span{
            color: rgb(255, 0, 0);
            font-weight: bold;
        }
        .hanra{
            color: orangered;
            font-weight: 900;
        }
        .orange{
            color: orange;
        }
        .two{
            color: yellow;
            text-align: center;
        }
        .three{
            color: blue;
        }
        em{
            font-size: 14px;
            color: rgba(0, 0, 0, 0.5);
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: lightgreen;
            text-align: center;
            line-height: 200px;
            /* text-decoration: underline; */
            /* text-decoration: overline; */
            text-decoration: line-through;
        }
        .box2{
            width: 100px;
            height: 100px;
            background-color: lightcoral;
            text-align: center;
            line-height: 100px;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>레드향</h1>
    <h2>냠냠</h2>
    <p>껍질에 붉은 빛이 돌아 <span>레드향</span>이라 불린다</p>
    <p class="two">레드향은 <span class="hanra">한라봉</span>과 <span class="orange">귤</span>을 교배한 것으로</p>
    <p class="three">일반 귤보다 2~3배 크고, 과육이 <em>붉고 통통</em> 하다</p>
    <!-- 박스 안에 글자 중간 정렬 -->
     <div class="box">박스 - 1</div>
     <div class="box2">박스 - 2</div>
     <a href="https://www.google.com">구글로 이동</a>
</body>
</html>
