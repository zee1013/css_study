<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>flex ex</title>
    <link rel="stylesheet" href="css/flex_ex.css">
</head>
<body>

        <!-- 이미지 영역 -->

        </div>
    </div>

    <div class="ex2">
        <!-- 텍스트 영역 -->
        <div class="text-box2">
            <h3>웨일 브라우저</h3>
            <h4>이용안내</h4>
        </div>
        <!-- 이미지 영역 -->
         <div class="image-box2">
            <img src="image/whale.jpg" alt="웨일 로고">
         </div>
    </div>
